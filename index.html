<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YSN MUSIC</title>

<meta name="theme-color" content="#00ff99">

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
overflow:hidden;
}

.glass{
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.05);
}

.song-card{
transition:.25s;
cursor:pointer;
}

.song-card:hover{
transform:scale(1.02);
background:rgba(255,255,255,.08);
}

.song-cover{
width:72px;
height:72px;
border-radius:18px;
object-fit:cover;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:86px;
display:flex;
justify-content:space-around;
align-items:center;
background:rgba(15,15,15,.96);
backdrop-filter:blur(25px);
border-top:1px solid rgba(255,255,255,.05);
z-index:999;
}

.bottom-nav button{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
font-size:12px;
color:#aaa;
transition:.2s;
}

.bottom-nav button:hover{
color:#00ff99;
transform:translateY(-2px);
}

.mini-player{
position:fixed;
bottom:92px;
left:10px;
right:10px;
padding:12px;
border-radius:24px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(18,18,18,.96);
backdrop-filter:blur(30px);
z-index:998;
}

.progress{
height:4px;
width:100%;
background:#222;
border-radius:999px;
overflow:hidden;
margin-top:5px;
}

.progress div{
height:100%;
width:0%;
background:#00ff99;
}

.rotate{
animation:spin 12s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

#fullPlayer{
background:linear-gradient(to bottom,#111,#000);
}

input[type=range]{
accent-color:#00ff99;
}

.scrollbar-hide::-webkit-scrollbar{
display:none;
}

.install-btn{
background:#00ff99;
color:black;
padding:10px 18px;
border-radius:999px;
font-weight:bold;
}

</style>
</head>
<body>

<div class="h-screen flex flex-col">

<header class="glass p-4 flex items-center justify-between">

<div>
<h1 class="text-4xl font-black text-green-400">
YSN MUSIC
</h1>

<p class="text-gray-400 text-sm mt-1">
Global Hits • Punjabi • Bollywood • Hip-Hop • Nonstop Vibes
</p>
</div>

<button id="installBtn" class="install-btn hidden">
Install
</button>

</header>

<div class="p-4">
<input
id="searchInput"
placeholder="Search songs or artists..."
class="w-full px-5 py-4 rounded-3xl glass outline-none text-white"
/>
</div>

<div
id="songList"
class="flex-1 overflow-y-auto px-4 pb-44 scrollbar-hide"
></div>

<div
id="downloadsList"
class="hidden flex-1 overflow-y-auto px-4 pb-44 scrollbar-hide"
></div>

<div
id="miniPlayer"
class="mini-player hidden"
>

<div class="flex items-center gap-3 flex-1 overflow-hidden">

<img
id="miniCover"
class="w-14 h-14 rounded-2xl object-cover"
/>

<div class="overflow-hidden w-full">

<h2
id="miniTitle"
class="font-bold truncate"
>
No Song
</h2>

<p
id="miniArtist"
class="text-gray-400 text-sm truncate"
>
Artist
</p>

<div class="progress">
<div id="progressBar"></div>
</div>

</div>

</div>

<button
id="playBtn"
class="text-3xl text-green-400"
>
▶
</button>

</div>

<div
id="fullPlayer"
class="hidden fixed inset-0 z-50 p-6 flex flex-col"
>

<div class="flex items-center justify-between">

<button
id="closePlayer"
class="text-4xl"
>
↓
</button>

<h2 class="text-lg">
Now Playing
</h2>

<div></div>

</div>

<div class="flex-1 flex flex-col justify-center items-center">

<img
id="playerCover"
class="w-72 h-72 rounded-3xl object-cover rotate"
/>

<h2
id="playerTitle"
class="text-3xl font-black mt-8 text-center"
></h2>

<p
id="playerArtist"
class="text-gray-400 mt-2"
></p>

<input
id="seekBar"
type="range"
value="0"
class="w-full mt-10"
/>

<div class="flex justify-between w-full mt-2 text-sm text-gray-400">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="flex items-center gap-10 mt-12 text-5xl">
<button id="prevBtn">⏮</button>
<button id="bigPlayBtn">▶</button>
<button id="nextBtn">⏭</button>
</div>

</div>
</div>

<nav class="bottom-nav">

<button onclick="showHome()">
<span class="text-2xl">🏠</span>
Home
</button>

<button onclick="focusSearch()">
<span class="text-2xl">🔍</span>
Search
</button>

<button onclick="openPlaylist()">
<span class="text-2xl">🎵</span>
Playlist
</button>

<button onclick="openDownloads()">
<span class="text-2xl">⬇</span>
Offline
</button>

</nav>

</div>

<audio id="audio"></audio>

<script>

const songs=[

{
title:'Excuses',
artist:'AP Dhillon',
cover:'https://picsum.photos/300?1',
stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
},

{
title:'Brown Munde',
artist:'AP Dhillon',
cover:'https://picsum.photos/300?2',
stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
},

{
title:'Softly',
artist:'Karan Aujla',
cover:'https://picsum.photos/300?3',
stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
},

{
title:'Insane',
artist:'AP Dhillon',
cover:'https://picsum.photos/300?4',
stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'
},

{
title:'52 Bars',
artist:'Karan Aujla',
cover:'https://picsum.photos/300?5',
stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3'
},

{
title:'Lemonade',
artist:'Diljit Dosanjh',
cover:'https://picsum.photos/300?6',
stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3'
},

{
title:'One Love',
artist:'Shubh',
cover:'https://picsum.photos/300?7',
stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3'
},

{
title:'Blinding Lights',
artist:'The Weeknd',
cover:'https://picsum.photos/300?8',
stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3'
}

];

const audio=document.getElementById('audio');
const songList=document.getElementById('songList');
const downloadsList=document.getElementById('downloadsList');
const searchInput=document.getElementById('searchInput');
const miniPlayer=document.getElementById('miniPlayer');
const playBtn=document.getElementById('playBtn');
const bigPlayBtn=document.getElementById('bigPlayBtn');
const seekBar=document.getElementById('seekBar');
const progressBar=document.getElementById('progressBar');

let currentSongs=[...songs];
let currentIndex=0;

function renderSongs(list){

songList.innerHTML='';

list.forEach((song,index)=>{

const card=document.createElement('div');

card.className='song-card glass rounded-3xl p-3 flex items-center gap-4 mb-4';

card.innerHTML=`

<img src="${song.cover}" class="song-cover">

<div class="flex-1 overflow-hidden">
<h2 class="font-bold truncate text-lg">${song.title}</h2>
<p class="text-gray-400 text-sm truncate">${song.artist}</p>
</div>

<div class="flex gap-2">

<button
onclick="event.stopPropagation();addPlaylist(${index})"
class="w-11 h-11 rounded-full bg-pink-500 text-white text-xl"
>
+
</button>

<button
onclick="event.stopPropagation();downloadSong(${index})"
class="w-11 h-11 rounded-full bg-green-400 text-black text-xl"
>
⬇
</button>

</div>
`;

card.onclick=()=>playSong(index);

songList.appendChild(card);

});

}

function playSong(index){

currentIndex=index;

const song=currentSongs[index];

audio.src=song.stream;
audio.play();

miniPlayer.classList.remove('hidden');

miniCover.src=song.cover;
miniTitle.innerText=song.title;
miniArtist.innerText=song.artist;

playerCover.src=song.cover;
playerTitle.innerText=song.title;
playerArtist.innerText=song.artist;

playBtn.innerText='⏸';
bigPlayBtn.innerText='⏸';

}

function togglePlay(){

if(audio.paused){

audio.play();

playBtn.innerText='⏸';
bigPlayBtn.innerText='⏸';

}else{

audio.pause();

playBtn.innerText='▶';
bigPlayBtn.innerText='▶';

}

}

playBtn.onclick=togglePlay;
bigPlayBtn.onclick=togglePlay;

nextBtn.onclick=()=>{

currentIndex=(currentIndex+1)%currentSongs.length;

playSong(currentIndex);

};

prevBtn.onclick=()=>{

currentIndex=(currentIndex-1+currentSongs.length)%currentSongs.length;

playSong(currentIndex);

};

audio.addEventListener('timeupdate',()=>{

if(audio.duration){

seekBar.max=audio.duration;
seekBar.value=audio.currentTime;

const percent=(audio.currentTime/audio.duration)*100;

progressBar.style.width=percent+'%';

currentTime.innerText=formatTime(audio.currentTime);

duration.innerText=formatTime(audio.duration);

}

});

seekBar.oninput=()=>{

audio.currentTime=seekBar.value;

};

function formatTime(sec){

if(!sec) return '0:00';

const m=Math.floor(sec/60);
const s=Math.floor(sec%60);

return `${m}:${s.toString().padStart(2,'0')}`;

}

searchInput.addEventListener('input',()=>{

const q=searchInput.value.toLowerCase();

currentSongs=songs.filter(song=>

song.title.toLowerCase().includes(q)
||
song.artist.toLowerCase().includes(q)

);

renderSongs(currentSongs);

});

miniPlayer.onclick=()=>{

fullPlayer.classList.remove('hidden');

};

closePlayer.onclick=()=>{

fullPlayer.classList.add('hidden');

};

function addPlaylist(index){

const song=currentSongs[index];

let playlist=JSON.parse(localStorage.getItem('ysn_playlist')||'[]');

playlist.push(song);

localStorage.setItem('ysn_playlist',JSON.stringify(playlist));

alert('Added To Playlist ❤️');

}

function openPlaylist(){

songList.classList.add('hidden');
downloadsList.classList.remove('hidden');

downloadsList.innerHTML='';

const playlist=JSON.parse(localStorage.getItem('ysn_playlist')||'[]');

if(playlist.length===0){

downloadsList.innerHTML='<div class="text-center py-20 text-gray-400">No Playlist Songs</div>';

return;

}

playlist.forEach(song=>{

const card=document.createElement('div');

card.className='song-card glass rounded-3xl p-3 flex items-center gap-4 mb-4';

card.innerHTML=`

<img src="${song.cover}" class="song-cover">

<div class="flex-1 overflow-hidden">
<h2 class="font-bold truncate">${song.title}</h2>
<p class="text-gray-400 text-sm truncate">${song.artist}</p>
</div>
`;

card.onclick=()=>{

audio.src=song.stream;
audio.play();

};

downloadsList.appendChild(card);

});

}

async function downloadSong(index){

const song=currentSongs[index];

const cache=await caches.open('offline-music');

await cache.add(song.stream);

let downloads=JSON.parse(localStorage.getItem('downloads')||'[]');

downloads.push(song);

localStorage.setItem('downloads',JSON.stringify(downloads));

alert('Downloaded Offline ✅');

}

async function openDownloads(){

songList.classList.add('hidden');
downloadsList.classList.remove('hidden');

downloadsList.innerHTML='';

const downloads=JSON.parse(localStorage.getItem('downloads')||'[]');

if(downloads.length===0){

downloadsList.innerHTML='<div class="text-center py-20 text-gray-400">No Offline Songs</div>';

return;

}

downloads.forEach(song=>{

const card=document.createElement('div');

card.className='song-card glass rounded-3xl p-3 flex items-center gap-4 mb-4';

card.innerHTML=`

<img src="${song.cover}" class="song-cover">

<div class="flex-1 overflow-hidden">
<h2 class="font-bold truncate">${song.title}</h2>
<p class="text-gray-400 text-sm truncate">${song.artist}</p>
</div>
`;

card.onclick=()=>{

audio.src=song.stream;
audio.play();

};

downloadsList.appendChild(card);

});

}

function showHome(){

songList.classList.remove('hidden');
downloadsList.classList.add('hidden');

}

function focusSearch(){

searchInput.focus();

}

renderSongs(currentSongs);

</script>

</body>
</html>
