<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Ludo Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            padding: 10px;
        }

        .container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1100px;
        }

        .setup-screen {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 450px;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .game-section {
            display: none;
        }

        .game-section.active {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .setup-screen h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .setup-section {
            margin-bottom: 25px;
            text-align: center;
        }

        .setup-section label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .setup-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.3s;
        }

        .setup-btn:hover {
            border-color: #999;
            background: #f5f5f5;
        }

        .setup-btn.selected {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .start-btn:hover:not(:disabled) {
            background: #45a049;
        }

        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .board-wrapper {
            position: relative;
            width: 550px;
            height: 550px;
            background: white;
            border: 6px solid #000;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .cell {
            border: 1px solid #888;
            position: relative;
        }

        .home-red {
            grid-column: 1 / 6;
            grid-row: 1 / 6;
            background: #d32f2f;
            border: 3px solid #000;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            padding: 8px;
        }

        .home-green {
            grid-column: 11 / 16;
            grid-row: 1 / 6;
            background: #388e3c;
            border: 3px solid #000;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            padding: 8px;
        }

        .home-yellow {
            grid-column: 11 / 16;
            grid-row: 11 / 16;
            background: #fbc02d;
            border: 3px solid #000;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            padding: 8px;
        }

        .home-blue {
            grid-column: 1 / 6;
            grid-row: 11 / 16;
            background: #1976d2;
            border: 3px solid #000;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            padding: 8px;
        }

        .home-slot {
            background: white;
            border-radius: 50%;
            border: 2px solid #000;
            cursor: pointer;
            position: relative;
            z-index: 5;
        }

        .token {
            position: absolute;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #000;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
            font-weight: bold;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(0,0,0,0.3), inset 1px 1px 2px rgba(255,255,255,0.2);
        }

        .token.red {
            background: radial-gradient(circle at 35% 35%, #ff5555, #cc0000);
        }

        .token.green {
            background: radial-gradient(circle at 35% 35%, #66bb6a, #2e7d32);
        }

        .token.yellow {
            background: radial-gradient(circle at 35% 35%, #ffeb3b, #f57f17);
        }

        .token.blue {
            background: radial-gradient(circle at 35% 35%, #42a5f5, #1565c0);
        }

        .token.selectable {
            animation: tokenPulse 1.5s infinite;
            box-shadow: 0 0 20px rgba(255,255,255,0.8), 0 2px 8px rgba(0,0,0,0.4);
        }

        @keyframes tokenPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .control-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 280px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        .player-turn {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
            color: white;
            font-size: 1rem;
        }

        .player-turn.red { background: #d32f2f; }
        .player-turn.green { background: #388e3c; }
        .player-turn.yellow { background: #fbc02d; color: #000; }
        .player-turn.blue { background: #1976d2; }

        .dice-display {
            text-align: center;
            margin-bottom: 15px;
        }

        .dice {
            font-size: 50px;
            padding: 10px 15px;
            background: white;
            border: 3px solid #000;
            border-radius: 8px;
            display: inline-block;
            min-width: 70px;
        }

        .dice.rolling {
            animation: rollDice 0.5s;
        }

        @keyframes rollDice {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(360deg); }
            100% { transform: rotateX(720deg); }
        }

        .roll-btn {
            width: 100%;
            padding: 12px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .roll-btn:hover:not(:disabled) {
            background: #b71c1c;
        }

        .roll-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .info-text {
            text-align: center;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 0.9rem;
            min-height: 40px;
            margin-bottom: 12px;
        }

        .players-status {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .player-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
        }

        .player-item.red { background: #d32f2f; }
        .player-item.green { background: #388e3c; }
        .player-item.yellow { background: #fbc02d; color: #000; }
        .player-item.blue { background: #1976d2; }

        .player-item span:last-child {
            margin-left: auto;
        }

        .new-game-btn {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .new-game-btn:hover {
            background: #555;
        }

        .winner-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .winner-screen.active {
            display: flex;
        }

        .winner-box {
            background: white;
            padding: 50px 40px;
            border-radius: 15px;
            text-align: center;
            border: 4px solid #000;
            animation: winnerAnimate 0.5s ease-out;
        }

        @keyframes winnerAnimate {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .winner-box h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .winner-box p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 25px;
        }

        .winner-box button {
            padding: 12px 30px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .winner-box button:hover {
            background: #45a049;
        }

        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .control-panel {
                width: 100%;
                max-width: 300px;
            }

            .board-wrapper {
                width: 90vw;
                height: 90vw;
                max-width: 500px;
                max-height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="setup-screen" id="setup">
            <h1>🎲 LUDO</h1>

            <div class="setup-section">
                <label>Number of Players</label>
                <div class="button-row" id="playerCountButtons">
                    <button class="setup-btn" data-value="1">1</button>
                    <button class="setup-btn" data-value="2">2</button>
                    <button class="setup-btn" data-value="3">3</button>
                    <button class="setup-btn" data-value="4">4</button>
                </div>
            </div>

            <div class="setup-section" id="botCountSection" style="display:none;">
                <label>Add Bots</label>
                <div class="button-row" id="botCountButtons"></div>
            </div>

            <div class="setup-section" id="difficultySection" style="display:none;">
                <label>Bot Difficulty</label>
                <div class="button-row" id="difficultyButtons">
                    <button class="setup-btn" data-value="easy">Easy</button>
                    <button class="setup-btn selected" data-value="medium">Medium</button>
                    <button class="setup-btn" data-value="hard">Hard</button>
                </div>
            </div>

            <button class="start-btn" id="startBtn" disabled>Start Game</button>
        </div>

        <div class="game-section" id="gameSection">
            <div class="board-wrapper" id="board">
                <div class="home-red" id="homeRed"></div>
                <div class="home-green" id="homeGreen"></div>
                <div class="home-yellow" id="homeYellow"></div>
                <div class="home-blue" id="homeBlue"></div>
            </div>

            <div class="control-panel">
                <div class="player-turn" id="playerTurn">Red's Turn</div>
                <div class="dice-display">
                    <div class="dice" id="dice">🎲</div>
                </div>
                <button class="roll-btn" id="rollBtn">Roll Dice</button>
                <div class="info-text" id="infoText">Roll the dice!</div>
                <div class="players-status" id="playersList"></div>
                <button class="new-game-btn" onclick="location.reload()">New Game</button>
            </div>
        </div>
    </div>

    <div class="winner-screen" id="winnerScreen">
        <div class="winner-box">
            <h2 id="winnerName">RED</h2>
            <p>WINS! 🎉</p>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        const COLORS = {
            red: { main: '#d32f2f', light: '#ffcccc' },
            green: { main: '#388e3c', light: '#ccffcc' },
            yellow: { main: '#fbc02d', light: '#ffffcc' },
            blue: { main: '#1976d2', light: '#ccccff' }
        };

        const PLAYERS = ['red', 'green', 'yellow', 'blue'];
        const DICE_EMOJIS = ['⚁', '⚂', '⚃', '⚄', '⚅', '⚀'];
        const SAFE_SPOTS = [0, 8, 13, 21, 26, 34, 39, 47];

        // Board path layout (clockwise, 52 positions)
        const BOARD_PATH = [
            // Red entry (0-6)
            {x: 6, y: 1}, {x: 6, y: 2}, {x: 6, y: 3}, {x: 6, y: 4}, {x: 6, y: 5},
            {x: 5, y: 6}, {x: 4, y: 6},
            // Red turns up (7-12)
            {x: 3, y: 6}, {x: 2, y: 6}, {x: 1, y: 6}, {x: 0, y: 6}, {x: 0, y: 7}, {x: 0, y: 8},
            // Green entry (13-19)
            {x: 1, y: 8}, {x: 2, y: 8}, {x: 3, y: 8}, {x: 4, y: 8}, {x: 5, y: 8},
            {x: 6, y: 9}, {x: 6, y: 10},
            // Green turns right (20-25)
            {x: 6, y: 11}, {x: 6, y: 12}, {x: 6, y: 13}, {x: 6, y: 14}, {x: 7, y: 14}, {x: 8, y: 14},
            // Yellow entry (26-32)
            {x: 8, y: 13}, {x: 8, y: 12}, {x: 8, y: 11}, {x: 8, y: 10}, {x: 8, y: 9},
            {x: 9, y: 8}, {x: 10, y: 8},
            // Yellow turns down (33-38)
            {x: 11, y: 8}, {x: 12, y: 8}, {x: 13, y: 8}, {x: 14, y: 8}, {x: 14, y: 7}, {x: 14, y: 6},
            // Blue entry (39-45)
            {x: 13, y: 6}, {x: 12, y: 6}, {x: 11, y: 6}, {x: 10, y: 6}, {x: 9, y: 6},
            {x: 8, y: 5}, {x: 8, y: 4},
            // Blue turns left (46-51)
            {x: 8, y: 3}, {x: 8, y: 2}, {x: 8, y: 1}, {x: 8, y: 0}, {x: 7, y: 0}
        ];

        // Home finish paths
        const FINISH_PATHS = {
            red: [{x: 7, y: 2}, {x: 7, y: 3}, {x: 7, y: 4}, {x: 7, y: 5}, {x: 7, y: 6}, {x: 7, y: 7}],
            green: [{x: 2, y: 7}, {x: 3, y: 7}, {x: 4, y: 7}, {x: 5, y: 7}, {x: 6, y: 7}, {x: 7, y: 7}],
            yellow: [{x: 7, y: 12}, {x: 7, y: 11}, {x: 7, y: 10}, {x: 7, y: 9}, {x: 7, y: 8}, {x: 7, y: 7}],
            blue: [{x: 12, y: 7}, {x: 11, y: 7}, {x: 10, y: 7}, {x: 9, y: 7}, {x: 8, y: 7}, {x: 7, y: 7}]
        };

        // Entry points to finish lane
        const ENTRY_POINTS = {
            red: 50,
            green: 11,
            yellow: 24,
            blue: 37
        };

        // Start positions on main board
        const START_POSITIONS = {
            red: 0,
            green: 13,
            yellow: 26,
            blue: 39
        };

        let gameState = {
            players: [],
            currentPlayer: 0,
            tokens: {},
            diceValue: null,
            rolled: false,
            extraTurn: false,
            consecutiveSixes: 0,
            winner: null,
            botPlayers: [],
            botDifficulty: 'medium',
            gameActive: false
        };

        function initializeBoard() {
            const board = document.getElementById('board');

            // Clear existing cells
            const existingCells = board.querySelectorAll('.cell');
            existingCells.forEach(cell => cell.remove());

            // Create board cells
            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 15; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    // Color cells based on board design
                    let bgColor = 'white';

                    if (row < 5 && col < 5) bgColor = COLORS.red.main;
                    else if (row < 5 && col > 9) bgColor = COLORS.green.main;
                    else if (row > 9 && col > 9) bgColor = COLORS.yellow.main;
                    else if (row > 9 && col < 5) bgColor = COLORS.blue.main;
                    // Center finish area
                    else if (row >= 6 && row <= 8 && col >= 6 && col <= 8) {
                        if (row === 7 && col === 7) {
                            bgColor = 'conic-gradient(from 45deg, #d32f2f 0deg, #d32f2f 90deg, #388e3c 90deg, #388e3c 180deg, #fbc02d 180deg, #fbc02d 270deg, #1976d2 270deg)';
                        } else {
                            bgColor = 'white';
                        }
                    }
                    // Colored entry paths
                    else if (row === 7 && col >= 1 && col <= 5) bgColor = COLORS.red.light;
                    else if (col === 7 && row >= 1 && row <= 5) bgColor = COLORS.green.light;
                    else if (row === 7 && col >= 9 && col <= 13) bgColor = COLORS.yellow.light;
                    else if (col === 7 && row >= 9 && row <= 13) bgColor = COLORS.blue.light;
                    // Safe spots
                    else if ((row === 2 && col === 6) || (row === 6 && col === 2) ||
                             (row === 2 && col === 8) || (row === 6 && col === 12) ||
                             (row === 8 && col === 12) || (row === 12 && col === 8) ||
                             (row === 12 && col === 6) || (row === 8 && col === 2)) {
                        bgColor = '#f0f0f0';
                    }

                    if (bgColor.includes('gradient')) {
                        cell.style.background = bgColor;
                    } else {
                        cell.style.backgroundColor = bgColor;
                    }

                    board.appendChild(cell);
                }
            }

            // Initialize home areas
            initializeHomes();
        }

        function initializeHomes() {
            PLAYERS.forEach(player => {
                const home = document.getElementById('home' + player.charAt(0).toUpperCase() + player.slice(1));
                home.innerHTML = '';

                for (let i = 0; i < 4; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'home-slot';
                    slot.dataset.player = player;
                    slot.dataset.token = i;
                    home.appendChild(slot);
                }
            });
        }

        function setupGame(numPlayers, numBots, difficulty) {
            gameState.players = PLAYERS.slice(0, numPlayers + numBots);
            gameState.botPlayers = PLAYERS.slice(numPlayers, numPlayers + numBots);
            gameState.botDifficulty = difficulty;
            gameState.gameActive = true;

            PLAYERS.forEach(color => {
                gameState.tokens[color] = [];
                for (let i = 0; i < 4; i++) {
                    gameState.tokens[color].push({
                        id: i,
                        position: -1,
                        finished: false
                    });
                }
            });

            gameState.currentPlayer = 0;
            gameState.rolled = false;
            gameState.diceValue = null;
            gameState.extraTurn = false;
            gameState.consecutiveSixes = 0;
            gameState.winner = null;

            document.getElementById('setup').style.display = 'none';
            document.getElementById('gameSection').classList.add('active');

            initializeBoard();
            updateDisplay();

            if (gameState.botPlayers.includes(gameState.players[0])) {
                setTimeout(() => rollDice(), 500);
            }
        }

        function updateDisplay() {
            const player = gameState.players[gameState.currentPlayer];
            document.getElementById('playerTurn').className = 'player-turn ' + player;
            document.getElementById('playerTurn').textContent = player.charAt(0).toUpperCase() + player.slice(1) + "'s Turn";

            updatePlayersList();
            renderTokens();
            updateRollButton();
        }

        function updatePlayersList() {
            const list = document.getElementById('playersList');
            list.innerHTML = '';

            gameState.players.forEach(player => {
                const finishedCount = gameState.tokens[player].filter(t => t.finished).length;
                const item = document.createElement('div');
                item.className = 'player-item ' + player;
                item.innerHTML = `<span>${player.toUpperCase()}</span><span>${finishedCount}/4</span>`;
                list.appendChild(item);
            });
        }

        function renderTokens() {
            document.querySelectorAll('.token').forEach(t => t.remove());

            const boardElement = document.getElementById('board');
            const boardRect = boardElement.getBoundingClientRect();
            const cellSize = boardRect.width / 15;

            PLAYERS.forEach(color => {
                gameState.tokens[color].forEach((token, idx) => {
                    if (token.finished) return;

                    const tokenEl = document.createElement('div');
                    tokenEl.className = 'token ' + color;
                    tokenEl.dataset.player = color;
                    tokenEl.dataset.token = idx;

                    let pos = { x: 0, y: 0 };
                    let inHome = false;

                    if (token.position === -1) {
                        // In home
                        const slots = document.querySelectorAll(`.home-slot[data-player="${color}"][data-token="${idx}"]`);
                        if (slots.length > 0) {
                            const slotRect = slots[0].getBoundingClientRect();
                            tokenEl.style.left = (slotRect.left - boardRect.left + slotRect.width / 2 - 16) + 'px';
                            tokenEl.style.top = (slotRect.top - boardRect.top + slotRect.height / 2 - 16) + 'px';
                            inHome = true;
                        }
                    } else if (token.position < 52) {
                        // On main path
                        pos = BOARD_PATH[token.position];
                        tokenEl.style.left = (pos.x * cellSize + cellSize * 0.2) + 'px';
                        tokenEl.style.top = (pos.y * cellSize + cellSize * 0.2) + 'px';
                    } else if (token.position >= 52 && token.position <= 57) {
                        // On finish path
                        const finishIdx = token.position - 52;
                        pos = FINISH_PATHS[color][finishIdx];
                        tokenEl.style.left = (pos.x * cellSize + cellSize * 0.2) + 'px';
                        tokenEl.style.top = (pos.y * cellSize + cellSize * 0.2) + 'px';
                    }

                    if (canSelectToken(color, token)) {
                        tokenEl.classList.add('selectable');
                    }

                    tokenEl.addEventListener('click', () => moveTokenAction(color, idx));
                    boardElement.appendChild(tokenEl);
                });
            });
        }

        function canSelectToken(color, token) {
            if (!gameState.rolled || gameState.diceValue === null) return false;
            if (color !== gameState.players[gameState.currentPlayer]) return false;
            if (gameState.botPlayers.includes(color)) return false;
            if (token.finished) return false;

            // Token opens only on rolling 6
            if (token.position === -1) {
                return gameState.diceValue === 6;
            }

            const newPos = calculateNewPosition(color, token.position, gameState.diceValue);
            return newPos !== null;
        }

        function calculateNewPosition(color, currentPos, steps) {
            if (currentPos === -1) {
                return steps === 6 ? START_POSITIONS[color] : null;
            }

            const entryPoint = ENTRY_POINTS[color];

            // Handle movement on main path and transition to finish
            if (currentPos < 52) {
                // Calculate steps until entry point
                let stepsToEntry = 0;
                if (currentPos <= entryPoint) {
                    stepsToEntry = entryPoint - currentPos;
                } else {
                    stepsToEntry = (52 - currentPos) + entryPoint;
                }

                if (steps <= stepsToEntry) {
                    // Stay on main path
                    return (currentPos + steps) % 52;
                } else {
                    // Move to finish path
                    const stepsInFinish = steps - stepsToEntry;
                    if (stepsInFinish > 6) return null;
                    return 52 + stepsInFinish - 1;
                }
            } else if (currentPos >= 52 && currentPos < 58) {
                // On finish path
                const newPos = currentPos + steps;
                if (newPos > 57) return null;
                return newPos;
            }

            return null;
        }

        function moveTokenAction(color, tokenIdx) {
            if (!gameState.rolled || gameState.diceValue === null) return;
            if (color !== gameState.players[gameState.currentPlayer]) return;
            if (gameState.botPlayers.includes(color)) return;

            const token = gameState.tokens[color][tokenIdx];
            if (token.finished) return;

            // Token opens only on rolling 6
            if (token.position === -1 && gameState.diceValue !== 6) return;

            const newPos = calculateNewPosition(color, token.position, gameState.diceValue);
            if (newPos === null) return;

            moveToken(color, tokenIdx, newPos);
        }

        function moveToken(color, tokenIdx, newPos) {
            const token = gameState.tokens[color][tokenIdx];
            token.position = newPos;

            // Check if finished
            if (newPos === 57) {
                token.finished = true;
                checkWin();
            } else if (newPos < 52 && !SAFE_SPOTS.includes(newPos)) {
                // Kill enemy tokens
                PLAYERS.forEach(otherColor => {
                    if (otherColor !== color) {
                        gameState.tokens[otherColor].forEach(otherToken => {
                            if (!otherToken.finished && otherToken.position === newPos) {
                                otherToken.position = -1;
                            }
                        });
                    }
                });
            }

            gameState.rolled = false;

            if (gameState.diceValue !== 6) {
                gameState.extraTurn = false;
                setTimeout(() => endTurn(), 500);
            } else {
                gameState.extraTurn = true;
                updateDisplay();
            }

            gameState.diceValue = null;
            updateDisplay();
        }

        function rollDice() {
            if (gameState.rolled || gameState.winner) return;

            const dice = document.getElementById('dice');
            dice.classList.add('rolling');

            setTimeout(() => {
                gameState.diceValue = Math.floor(Math.random() * 6) + 1;
                dice.classList.remove('rolling');
                dice.textContent = DICE_EMOJIS[gameState.diceValue - 1];
                gameState.rolled = true;

                const player = gameState.players[gameState.currentPlayer];

                // Check for three consecutive 6s
                if (gameState.diceValue === 6) {
                    gameState.consecutiveSixes++;
                    if (gameState.consecutiveSixes >= 3) {
                        document.getElementById('infoText').textContent = 'Three 6s! Turn lost.';
                        setTimeout(() => endTurn(), 1500);
                        return;
                    }
                } else {
                    gameState.consecutiveSixes = 0;
                }

                // Check if player can move
                if (!canMoveAny(player)) {
                    if (gameState.diceValue === 6) {
                        document.getElementById('infoText').textContent = 'Rolled 6 but no moves. Rolling again...';
                        gameState.rolled = false;
                        setTimeout(() => rollDice(), 1000);
                    } else {
                        document.getElementById('infoText').textContent = 'No valid moves. Skipping turn...';
                        setTimeout(() => endTurn(), 1000);
                    }
                    return;
                }

                updateDisplay();

                if (gameState.botPlayers.includes(player)) {
                    setTimeout(() => botMove(), 800);
                }
            }, 600);
        }

        function canMoveAny(color) {
            return gameState.tokens[color].some(token => {
                if (token.finished) return false;
                if (token.position === -1) return gameState.diceValue === 6;
                return calculateNewPosition(color, token.position, gameState.diceValue) !== null;
            });
        }

        function botMove() {
            const color = gameState.players[gameState.currentPlayer];
            let bestToken = -1;
            let bestScore = -Infinity;

            gameState.tokens[color].forEach((token, idx) => {
                if (token.finished) return;

                let score = 0;
                const newPos = calculateNewPosition(color, token.position, gameState.diceValue);
                if (newPos === null) return;

                // Prioritize finishing
                if (newPos === 57) {
                    score = 10000;
                } else if (newPos >= 52) {
                    score = 5000 + newPos;
                } else if (SAFE_SPOTS.includes(newPos)) {
                    score = 500;
                } else {
                    score = newPos;

                    // Hard difficulty: try to kill
                    if (gameState.botDifficulty === 'hard') {
                        PLAYERS.forEach(otherColor => {
                            if (otherColor !== color) {
                                gameState.tokens[otherColor].forEach(otherToken => {
                                    if (!otherToken.finished && otherToken.position === newPos) {
                                        score += 2000;
                                    }
                                });
                            }
                        });
                    }
                }

                if (score > bestScore) {
                    bestScore = score;
                    bestToken = idx;
                }
            });

            if (bestToken !== -1) {
                const newPos = calculateNewPosition(color, gameState.tokens[color][bestToken].position, gameState.diceValue);
                moveToken(color, bestToken, newPos);
            } else {
                endTurn();
            }
        }

        function endTurn() {
            gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.players.length;
            gameState.rolled = false;
            gameState.diceValue = null;
            gameState.extraTurn = false;
            gameState.consecutiveSixes = 0;

            document.getElementById('dice').textContent = '🎲';
            document.getElementById('infoText').textContent = 'Roll the dice!';

            updateDisplay();

            if (gameState.botPlayers.includes(gameState.players[gameState.currentPlayer])) {
                setTimeout(() => rollDice(), 500);
            }
        }

        function checkWin() {
            const player = gameState.players[gameState.currentPlayer];
            if (gameState.tokens[player].every(t => t.finished)) {
                gameState.winner = player;
                document.getElementById('winnerName').textContent = player.toUpperCase();
                document.getElementById('winnerName').style.color = COLORS[player].main;
                document.getElementById('winnerScreen').classList.add('active');
            }
        }

        function updateRollButton() {
            const btn = document.getElementById('rollBtn');
            btn.disabled = gameState.rolled && !gameState.extraTurn;
            btn.textContent = gameState.rolled ? 'Move Token' : 'Roll Dice';
        }

        // Setup event listeners
        document.getElementById('rollBtn').addEventListener('click', rollDice);

        document.querySelectorAll('#playerCountButtons .setup-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#playerCountButtons .setup-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');

                const numPlayers = parseInt(btn.dataset.value);
                const botSection = document.getElementById('botCountSection');
                const difficultySection = document.getElementById('difficultySection');

                if (numPlayers === 4) {
                    botSection.style.display = 'none';
                    difficultySection.style.display = 'none';
                    document.getElementById('startBtn').disabled = false;
                } else if (numPlayers === 1) {
                    botSection.style.display = 'none';
                    difficultySection.style.display = 'block';
                    document.getElementById('startBtn').disabled = false;
                } else {
                    botSection.style.display = 'block';
                    difficultySection.style.display = 'block';

                    const botButtons = document.getElementById('botCountButtons');
                    botButtons.innerHTML = '';

                    for (let i = 0; i <= 4 - numPlayers; i++) {
                        const botBtn = document.createElement('button');
                        botBtn.className = 'setup-btn' + (i === 0 ? ' selected' : '');
                        botBtn.dataset.value = i;
                        botBtn.textContent = i;

                        botBtn.addEventListener('click', () => {
                            document.querySelectorAll('#botCountButtons .setup-btn').forEach(b => b.classList.remove('selected'));
                            botBtn.classList.add('selected');
                        });

                        botButtons.appendChild(botBtn);
                    }

                    document.getElementById('startBtn').disabled = false;
                }
            });
        });

        document.querySelectorAll('#difficultyButtons .setup-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#difficultyButtons .setup-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            const selectedPlayers = document.querySelector('#playerCountButtons .setup-btn.selected');
            if (!selectedPlayers) return;

            let numPlayers = parseInt(selectedPlayers.dataset.value);
            let numBots = 0;

            if (numPlayers < 4) {
                const selectedBots = document.querySelector('#botCountButtons .setup-btn.selected');
                if (selectedBots) {
                    numBots = parseInt(selectedBots.dataset.value);
                } else if (numPlayers === 1) {
                    numBots = 3;
                }
            }

            const selectedDifficulty = document.querySelector('#difficultyButtons .setup-btn.selected');
            const difficulty = selectedDifficulty ? selectedDifficulty.dataset.value : 'medium';

            setupGame(numPlayers, numBots, difficulty);
        });

        // Show setup on page load
        document.getElementById('setup').style.display = 'flex';
    </script>
</body>
</html>
