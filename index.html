<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic Professional Ludo</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}
body{
background:#08152f;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
color:white;
}
h1{
margin-bottom:20px;
font-size:42px;
}
#menu{
background:#13203c;
padding:25px;
border-radius:20px;
display:flex;
flex-direction:column;
gap:15px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}
#game{
display:none;
flex-direction:column;
align-items:center;
}
select,button{
padding:14px;
font-size:18px;
border:none;
border-radius:12px;
}
button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}
button:hover{
background:#1d4ed8;
}
#topbar{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
justify-content:center;
}
.panel{
background:#13203c;
padding:15px 25px;
border-radius:15px;
min-width:180px;
text-align:center;
}
#turn{
font-size:24px;
font-weight:bold;
}
#dice{
font-size:54px;
margin-bottom:10px;
}
#board{
width:760px;
height:760px;
display:grid;
grid-template-columns:repeat(15,1fr);
grid-template-rows:repeat(15,1fr);
background:#222;
padding:8px;
position:relative;
transform:rotate(45deg) scale(0.9);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}
.cell{
background:white;
border:1px solid #dfe6e9;
position:relative;
}
.green-zone{background:#00a651;}
.yellow-zone{background:#f4c20d;}
.blue-zone{background:#1e88e5;}
.red-zone{background:#e53935;}
.green-home-path{background:#6dff99;}
.yellow-home-path{background:#ffe66d;}
.blue-home-path{background:#73b7ff;}
.red-home-path{background:#ff8c8c;}
.center-finish{
background:conic-gradient(red 0deg 90deg,#1e88e5 90deg 180deg,#00a651 180deg 270deg,#f4c20d 270deg 360deg);
}
.token{
width:28px;
height:28px;
border-radius:50%;
position:absolute;
z-index:20;
border:3px solid white;
cursor:pointer;
transition:0.25s;
transform:rotate(-45deg);
}
.token:hover{
transform:rotate(-45deg) scale(1.1);
}
.green{background:#00c853;}
.yellow{background:#ffd600;}
.blue{background:#2979ff;}
.red{background:#ff1744;}
.safe{
background:#dfe6e9 !important;
}
.finished{
opacity:0.4;
pointer-events:none;
}
.active{
animation:pulse 1s infinite;
}
@keyframes pulse{
0%{box-shadow:0 0 0px white;}
50%{box-shadow:0 0 18px white;}
100%{box-shadow:0 0 0px white;}
}
@media(max-width:850px){
#board{
width:95vw;
height:95vw;
}
.token{
width:18px;
height:18px;
}
}
</style>
</head>
<body>
<h1>🎲 Classic Ludo</h1>
<div id="menu">
<select id="players">
<option value="1">1 Player vs Bot</option>
<option value="2">2 Players</option>
<option value="3">3 Players</option>
<option value="4">4 Players</option>
</select>
<select id="difficulty">
<option value="easy">Easy Bot</option>
<option value="medium">Medium Bot</option>
<option value="hard">Hard Bot</option>
</select>
<button id="startBtn">Start Game</button>
</div>
<div id="game">
<div id="topbar">
<div class="panel">
<div id="turn">GREEN TURN</div>
</div>
<div class="panel">
<div id="dice">🎲</div>
<button id="rollBtn">Roll Dice</button>
</div>
</div>
<div id="board"></div>
</div>
<script>
const board=document.getElementById('board');
const rollBtn=document.getElementById('rollBtn');
const diceText=document.getElementById('dice');
const turnText=document.getElementById('turn');
const cells=[];
for(let i=0;i<225;i++){
const cell=document.createElement('div');
cell.classList.add('cell');
board.appendChild(cell);
cells.push(cell);
}
function fillArea(sr,sc,color){
for(let r=sr;r<sr+6;r++){
for(let c=sc;c<sc+6;c++){
cells[r*15+c].classList.add(color);
}
}
}
fillArea(0,0,'green-zone');
fillArea(0,9,'yellow-zone');
fillArea(9,9,'blue-zone');
fillArea(9,0,'red-zone');
const center=[111,112,113,126,127,128,141,142,143];
center.forEach(i=>cells[i].classList.add('center-finish'));
const greenLane=[96,81,66,51,36,21];
const yellowLane=[38,53,68,83,98,113];
const blueLane=[128,143,158,173,188,203];
const redLane=[186,171,156,141,126,111];
greenLane.forEach(i=>cells[i].classList.add('green-home-path'));
yellowLane.forEach(i=>cells[i].classList.add('yellow-home-path'));
blueLane.forEach(i=>cells[i].classList.add('blue-home-path'));
redLane.forEach(i=>cells[i].classList.add('red-home-path'));
const path=[
91,92,93,94,95,80,65,50,35,20,
21,22,23,24,25,26,41,56,71,86,
101,102,103,104,105,120,135,150,
165,180,195,210,209,208,207,206,
205,204,203,202,187,172,157,142,
127,126,125,124,123,122,121,106,
91
];
const safe=[91,21,105,203,127,195,121,25];
safe.forEach(i=>cells[i].classList.add('safe'));
const playersData=[
{name:'GREEN',color:'green',start:0},
{name:'YELLOW',color:'yellow',start:13},
{name:'BLUE',color:'blue',start:26},
{name:'RED',color:'red',start:39}
];
const homes={
green:[[1,1],[1,3],[3,1],[3,3]],
yellow:[[1,11],[1,13],[3,11],[3,13]],
blue:[[11,11],[11,13],[13,11],[13,13]],
red:[[11,1],[11,3],[13,1],[13,3]]
};
let players=[];
let tokens=[];
let currentPlayer=0;
let diceValue=0;
let botMode=false;
function createTokens(){
players.forEach((p,pIndex)=>{
for(let i=0;i<4;i++){
const token=document.createElement('div');
token.classList.add('token',p.color);
token.dataset.player=pIndex;
token.dataset.pos='-1';
token.dataset.finished='false';
token.dataset.id=i;
token.onclick=()=>moveToken(token);
board.appendChild(token);
tokens.push(token);
setHome(token,p.color,i);
}
});
}
function setHome(token,color,index){
const pos=homes[color][index];
moveVisual(token,pos[0],pos[1]);
}
function moveVisual(token,row,col){
const size=board.clientWidth/15;
token.style.left=(col*size+size*0.18)+'px';
token.style.top=(row*size+size*0.18)+'px';
}
function renderToken(token){
let pos=parseInt(token.dataset.pos);
if(pos===-1){
setHome(token,players[token.dataset.player].color,token.dataset.id);
return;
}
if(pos>=path.length)return;
let boardIndex=path[pos];
let row=Math.floor(boardIndex/15);
let col=boardIndex%15;
moveVisual(token,row,col);
}
function updateTurn(){
turnText.innerHTML=players[currentPlayer].name+' TURN';
turnText.style.color=players[currentPlayer].color;
document.querySelectorAll('.token').forEach(t=>t.classList.remove('active'));
tokens.forEach(t=>{
if(parseInt(t.dataset.player)===currentPlayer && t.dataset.finished==='false'){
t.classList.add('active');
}
});
if(botMode && currentPlayer===1){
setTimeout(botPlay,800);
}
}
function nextTurn(){
diceValue=0;
currentPlayer++;
if(currentPlayer>=players.length){
currentPlayer=0;
}
updateTurn();
}
rollBtn.onclick=()=>{
if(botMode && currentPlayer===1)return;
rollDice();
};
function rollDice(){
diceValue=Math.floor(Math.random()*6)+1;
const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
diceText.innerHTML=faces[diceValue-1];
checkMoves();
}
function checkMoves(){
const mine=tokens.filter(t=>parseInt(t.dataset.player)===currentPlayer && t.dataset.finished==='false');
let possible=false;
for(const token of mine){
const pos=parseInt(token.dataset.pos);
if(pos===-1 && diceValue===6)possible=true;
if(pos!==-1 && pos+diceValue<=path.length)possible=true;
}
if(!possible){
setTimeout(()=>{
nextTurn();
},700);
}
}
function moveToken(token){
if(parseInt(token.dataset.player)!==currentPlayer)return;
if(diceValue===0)return;
if(token.dataset.finished==='true')return;

let pos=parseInt(token.dataset.pos);

if(pos===-1){

if(diceValue===6){

pos=players[currentPlayer].start;

}else{
return;
}

}else{

if(pos+diceValue>path.length-1)return;

pos+=diceValue;
}

if(pos>=path.length-1){

pos=path.length-1;

token.dataset.finished='true';

token.classList.add('finished');

checkWinner(currentPlayer);

}else{

token.dataset.pos=pos;

renderToken(token);

killCheck(token);
}

if(diceValue!==6){
nextTurn();
}

diceValue=0;
}
function killCheck(active){
const activePos=parseInt(active.dataset.pos);
const boardIndex=path[activePos];
if(safe.includes(boardIndex))return;
tokens.forEach(t=>{
if(t===active)return;
if(t.dataset.player===active.dataset.player)return;
if(t.dataset.finished==='true')return;
if(parseInt(t.dataset.pos)===activePos){
t.dataset.pos='-1';
renderToken(t);
}
});
}
function checkWinner(playerIndex){
const mine=tokens.filter(t=>parseInt(t.dataset.player)===playerIndex);
const won=mine.every(t=>t.dataset.finished==='true');
if(won){
setTimeout(()=>{
alert(players[playerIndex].name+' WINS! 🎉');
location.reload();
},500);
}
}
function botPlay(){
rollDice();
setTimeout(()=>{
const bot=tokens.filter(t=>parseInt(t.dataset.player)===1 && t.dataset.finished==='false');
let valid=[];
for(const token of bot){
const pos=parseInt(token.dataset.pos);
if(pos===-1 && diceValue===6)valid.push(token);
if(pos!==-1 && pos+diceValue<=path.length)valid.push(token);
}
if(valid.length===0){
nextTurn();
return;
}
moveToken(valid[0]);
},1000);
}
window.addEventListener('resize',()=>{
tokens.forEach(renderToken);
});
document.getElementById('startBtn').onclick=()=>{
const count=parseInt(document.getElementById('players').value);
if(count===1){
players=[playersData[0],playersData[1]];
botMode=true;
}else{
players=playersData.slice(0,count);
}
document.getElementById('menu').style.display='none';
document.getElementById('game').style.display='flex';
createTokens();
updateTurn();
};
</script>
</body>
</html>
