<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Game</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#222;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin:10px;
}

#board{
    width:600px;
    height:600px;
    background:white;
    display:grid;
    grid-template-columns:repeat(15,1fr);
    grid-template-rows:repeat(15,1fr);
    position:relative;
    border:5px solid black;
}

.cell{
    border:1px solid #ddd;
    box-sizing:border-box;
    position:relative;
}

.red-home{background:#ff4d4d;}
.green-home{background:#4dff88;}
.yellow-home{background:#ffe066;}
.blue-home{background:#4da6ff;}

.path{
    background:#fafafa;
}

.safe{
    background:#ccc;
}

.token{
    width:28px;
    height:28px;
    border-radius:50%;
    position:absolute;
    cursor:pointer;
    border:2px solid black;
    z-index:10;
}

.red{background:red;}
.green{background:green;}
.yellow{background:yellow;}
.blue{background:blue;}

#controls{
    margin:20px;
    text-align:center;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}

#dice{
    font-size:30px;
    margin:10px;
}

#status{
    font-size:20px;
}

@media(max-width:700px){
    #board{
        width:95vw;
        height:95vw;
    }

    .token{
        width:18px;
        height:18px;
    }
}
</style>
</head>
<body>

<h1>Ludo Pass & Play</h1>

<div id="board"></div>

<div id="controls">
    <button id="rollBtn">Roll Dice</button>
    <div id="dice">🎲</div>
    <div id="status"></div>
</div>

<script>

const board = document.getElementById("board");

const cells=[];

for(let i=0;i<225;i++){
    const cell=document.createElement("div");
    cell.classList.add("cell");
    board.appendChild(cell);
    cells.push(cell);
}

function paintHome(startRow,startCol,color){

    for(let r=startRow;r<startRow+6;r++){
        for(let c=startCol;c<startCol+6;c++){
            cells[r*15+c].classList.add(color);
        }
    }
}

paintHome(0,0,"red-home");
paintHome(0,9,"green-home");
paintHome(9,0,"blue-home");
paintHome(9,9,"yellow-home");

const path = [
    6,7,8,23,38,53,68,83,
    98,113,128,127,126,125,
    124,123,122,121,136,151,
    166,181,196,211,212,213,
    214,215,216,217,218,203,
    188,173,158,143,142,141,
    140,139,138,137,136,121,
    106,91,76,61,46,31,16,
    17,18,19,20,21,22,37,
    52,67,82,97,112
];

const safeSpots=[0,8,13,21,26,34,39,47];

const players=[
{
    name:"RED",
    color:"red",
    start:0
},
{
    name:"GREEN",
    color:"green",
    start:13
},
{
    name:"YELLOW",
    color:"yellow",
    start:26
},
{
    name:"BLUE",
    color:"blue",
    start:39
}
];

let currentPlayer=0;
let diceValue=0;

const tokens=[];

const homePositions={
red:[[1,1],[1,3],[3,1],[3,3]],
green:[[1,11],[1,13],[3,11],[3,13]],
yellow:[[11,11],[11,13],[13,11],[13,13]],
blue:[[11,1],[11,3],[13,1],[13,3]]
};

players.forEach((player,pIndex)=>{

    for(let i=0;i<4;i++){

        const token=document.createElement("div");

        token.classList.add("token",player.color);

        token.dataset.player=pIndex;
        token.dataset.index=i;
        token.dataset.pos=-1;

        token.addEventListener("click",()=>moveToken(token));

        board.appendChild(token);

        tokens.push(token);

        placeHome(token,player.color,i);
    }
});

function placeHome(token,color,index){

    const pos=homePositions[color][index];

    placeToken(token,pos[0],pos[1]);
}

function placeToken(token,row,col){

    const size=board.clientWidth/15;

    token.style.left=(col*size+size*0.2)+"px";
    token.style.top=(row*size+size*0.2)+"px";
}

function renderToken(token){

    let pos=parseInt(token.dataset.pos);

    if(pos===-1){

        placeHome(
            token,
            players[token.dataset.player].color,
            token.dataset.index
        );

    }else{

        let cellIndex=path[pos%path.length];

        let row=Math.floor(cellIndex/15);
        let col=cellIndex%15;

        placeToken(token,row,col);
    }
}

function updateStatus(){

    status.innerHTML=
        players[currentPlayer].name+"'s TURN";
}

updateStatus();

rollBtn.onclick=function(){

    diceValue=Math.floor(Math.random()*6)+1;

    dice.innerHTML="🎲 "+diceValue;
};

function moveToken(token){

    if(parseInt(token.dataset.player)!==currentPlayer)
        return;

    if(diceValue===0)
        return;

    let pos=parseInt(token.dataset.pos);

    if(pos===-1){

        if(diceValue===6){

            pos=players[currentPlayer].start;

        }else{
            return;
        }

    }else{

        pos+=diceValue;

        if(pos>=path.length){

            token.dataset.pos=path.length;

            renderToken(token);

            checkWinner(currentPlayer);

            nextTurn();

            return;
        }
    }

    token.dataset.pos=pos;

    renderToken(token);

    checkKill(token);

    if(diceValue!==6){
        nextTurn();
    }

    diceValue=0;
}

function nextTurn(){

    currentPlayer++;

    if(currentPlayer>=players.length){
        currentPlayer=0;
    }

    updateStatus();
}

function checkKill(activeToken){

    const activePos=parseInt(activeToken.dataset.pos);

    if(safeSpots.includes(activePos))
        return;

    tokens.forEach(t=>{

        if(t===activeToken)
            return;

        if(t.dataset.player===activeToken.dataset.player)
            return;

        if(parseInt(t.dataset.pos)===activePos){

            t.dataset.pos=-1;

            renderToken(t);
        }
    });
}

function checkWinner(playerIndex){

    const playerTokens=tokens.filter(
        t=>parseInt(t.dataset.player)===playerIndex
    );

    const won=playerTokens.every(
        t=>parseInt(t.dataset.pos)>=path.length
    );

    if(won){

        alert(players[playerIndex].name+" WINS!");

        location.reload();
    }
}

window.addEventListener("resize",()=>{

    tokens.forEach(renderToken);
});

tokens.forEach(renderToken);

</script>

</body>
</html>
