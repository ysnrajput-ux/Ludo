<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YSN MUSIC PWA</title>

<script src="https://cdn.tailwindcss.com"></script>

<meta name="theme-color" content="#00ff99">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

.glass{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.06);
}

.neon{
  color:#00ff99;
}

.song-card{
  transition:0.3s;
}

.song-card:hover{
  transform:scale(1.02);
}

.song-cover{
  width:65px;
  height:65px;
  border-radius:18px;
  object-fit:cover;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:72px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:100;
}

.bottom-nav button{
  font-size:22px;
}

.mini-player{
  position:fixed;
  bottom:82px;
  left:10px;
  right:10px;
  height:78px;
  border-radius:26px;
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 16px;
  z-index:99;
}

.tab-btn{
  padding:10px 20px;
  border-radius:999px;
  background:rgba(255,255,255,0.08);
}

.active-tab{
  background:#00ff99;
  color:black;
  font-weight:bold;
}

input[type="range"]{
  accent-color:#00ff99;
}

.rotate{
  animation:spin 12s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.scrollbar-hide::-webkit-scrollbar{
  display:none;
}

#fullPlayer{
  background:linear-gradient(to bottom,#111,#000);
}

.install-btn{
  background:#00ff99;
  color:black;
  padding:10px 18px;
  border-radius:999px;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="h-screen flex flex-col">

<header class="glass p-4 flex items-center justify-between">
  <div>
    <h1 class="text-3xl font-bold neon">YSN MUSIC</h1>
    <p class="text-gray-400 text-sm">Punjabi Music Streaming</p>
  </div>

  <button id="installBtn" class="install-btn hidden">
    Install
  </button>
</header>

<div class="p-4">
  <input
    id="searchInput"
    placeholder="Search any song..."
    class="w-full px-5 py-4 rounded-2xl glass outline-none"
  />
</div>

<div class="px-4 flex gap-3 mb-3">
  <button class="tab-btn active-tab" data-tab="home">
    Home
  </button>

  <button class="tab-btn" data-tab="downloads">
    Downloads
  </button>
</div>

<div id="songList" class="flex-1 overflow-y-auto px-4 pb-40 scrollbar-hide"></div>

<div id="downloadsList" class="hidden flex-1 overflow-y-auto px-4 pb-40 scrollbar-hide"></div>

<div id="miniPlayer" class="mini-player glass">

  <img
    id="miniCover"
    src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=400"
    class="w-14 h-14 rounded-xl object-cover"
  />

  <div class="flex-1 overflow-hidden">
    <h3 id="miniTitle" class="font-bold truncate">
      No Song Playing
    </h3>

    <p id="miniArtist" class="text-gray-400 text-sm truncate">
      Artist
    </p>
  </div>

  <button id="playPauseBtn" class="text-2xl">
    ▶
  </button>

</div>

<div id="fullPlayer" class="hidden fixed inset-0 z-50 p-6 flex flex-col">

  <div class="flex items-center justify-between mb-6">
    <button id="closePlayer" class="text-3xl">↓</button>
    <h2 class="text-lg">Now Playing</h2>
    <div></div>
  </div>

  <div class="flex-1 flex flex-col justify-center items-center">

    <img
      id="playerCover"
      src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=400"
      class="w-72 h-72 rounded-3xl object-cover rotate"
    />

    <h2 id="playerTitle" class="text-3xl font-bold mt-8 text-center"></h2>

    <p id="playerArtist" class="text-gray-400 mt-2"></p>

    <input
      id="seekBar"
      type="range"
      value="0"
      class="w-full mt-10"
    />

    <div class="flex justify-between w-full mt-2 text-sm text-gray-400">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="flex items-center gap-10 mt-12 text-4xl">
      <button id="prevBtn">⏮</button>
      <button id="bigPlayBtn">▶</button>
      <button id="nextBtn">⏭</button>
    </div>

  </div>

</div>

<nav class="bottom-nav glass">
  <button>🏠</button>
  <button>🔍</button>
  <button>🎵</button>
  <button>⬇</button>
</nav>

</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById('audio');
const songList = document.getElementById('songList');
const downloadsList = document.getElementById('downloadsList');
const searchInput = document.getElementById('searchInput');
const playPauseBtn = document.getElementById('playPauseBtn');
const bigPlayBtn = document.getElementById('bigPlayBtn');
const seekBar = document.getElementById('seekBar');
const installBtn = document.getElementById('installBtn');
const fullPlayer = document.getElementById('fullPlayer');

let currentSongs = [];
let currentIndex = 0;
let deferredPrompt;

const AUDIOUS_API = 'https://discoveryprovider.audius.co/v1';
const ITUNES_API = 'https://itunes.apple.com/search';

const featuredArtists = [
  'Diljit Dosanjh',
  'Parmish Verma',
  'Karan Aujla',
  'AP Dhillon',
  'Sidhu Moosewala',
  'Shubh'
];

const fallbackSongs = [
  {
    title:'Blinding Lights',
    artist:'The Weeknd',
    cover:'https://i.scdn.co/image/ab67616d0000b2730f5d6e4f0b4e4f8b0e9d0b4f',
    stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
  },
  {
    title:'Levitating',
    artist:'Dua Lipa',
    cover:'https://i.scdn.co/image/ab67616d0000b273d4daf28d55fe419d5f1e0c5',
    stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
  },
  {
    title:'Stay',
    artist:'Justin Bieber',
    cover:'https://i.scdn.co/image/ab67616d0000b273d3d0f1d4d4f3d0f3d0f3d0f3',
    stream:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
  }
];

async function loadSongs(query='Punjabi songs'){

  try{

    // Try Audius API first
    const audiusRes = await fetch(
      `${AUDIOUS_API}/tracks/search?query=${encodeURIComponent(query)}&app_name=YSNMUSIC`
    );

    const audiusData = await audiusRes.json();

    let audiusSongs = (audiusData.data || []).map(song => ({
      title: song.title,
      artist: song.user?.name || 'Unknown Artist',
      cover:
        song.artwork?.['480x480'] ||
        'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=400',
      stream: `${AUDIOUS_API}/tracks/${song.id}/stream?app_name=YSNMUSIC`
    }));

    // iTunes Punjabi songs backup
    const itunesRes = await fetch(
      `${ITUNES_API}?term=${encodeURIComponent(query)}&media=music&limit=50`
    );

    const itunesData = await itunesRes.json();

    let itunesSongs = (itunesData.results || [])
      .filter(song => song.previewUrl)
      .map(song => ({
        title: song.trackName,
        artist: song.artistName,
        cover: song.artworkUrl100?.replace('100x100','600x600'),
        stream: song.previewUrl
      }));

    // Merge all songs
    currentSongs = [...audiusSongs, ...itunesSongs];

    // Remove duplicates
    currentSongs = currentSongs.filter(
      (song,index,self)=>
        index === self.findIndex(
          s=>s.title===song.title && s.artist===song.artist
        )
    );

    // If user searches artist name
    // it loads maximum available songs

    if(currentSongs.length === 0){
      currentSongs = fallbackSongs;
    }

    renderSongs(currentSongs);

  }catch(err){

    console.log(err);

    currentSongs = fallbackSongs;

    renderSongs(currentSongs);
  }
}

function renderSongs(songs){

  songList.innerHTML='';

  songs.forEach((song,index)=>{

    const card = document.createElement('div');

    card.className='song-card glass rounded-3xl p-3 flex items-center gap-4 mb-4';

    card.innerHTML=`
      <img src="${song.cover}" class="song-cover">

      <div class="flex-1 overflow-hidden">
        <h2 class="font-bold truncate">${song.title}</h2>
        <p class="text-gray-400 text-sm truncate">${song.artist}</p>
      </div>

      <button
        class="bg-green-400 text-black px-4 py-2 rounded-full font-bold"
        onclick="event.stopPropagation();downloadSong(${index})"
      >
        ⬇
      </button>
    `;

    card.addEventListener('click',()=>{
      playSong(index);
    });

    songList.appendChild(card);

  });
}

function playSong(index){

  currentIndex = index;

  const song = currentSongs[index];

  audio.src = song.stream;

  audio.play();

  updatePlayer(song);

  setupMediaSession(song);
}

function updatePlayer(song){

  document.getElementById('miniTitle').textContent = song.title;
  document.getElementById('miniArtist').textContent = song.artist;

  document.getElementById('playerTitle').textContent = song.title;
  document.getElementById('playerArtist').textContent = song.artist;

  document.getElementById('miniCover').src = song.cover;
  document.getElementById('playerCover').src = song.cover;
}

function togglePlay(){

  if(audio.paused){
    audio.play();
  }else{
    audio.pause();
  }
}

playPauseBtn.onclick = togglePlay;
bigPlayBtn.onclick = togglePlay;

nextBtn.onclick = ()=>{
  currentIndex = (currentIndex + 1) % currentSongs.length;
  playSong(currentIndex);
}

prevBtn.onclick = ()=>{
  currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
  playSong(currentIndex);
}

audio.addEventListener('play',()=>{
  playPauseBtn.textContent='⏸';
  bigPlayBtn.textContent='⏸';
});

audio.addEventListener('pause',()=>{
  playPauseBtn.textContent='▶';
  bigPlayBtn.textContent='▶';
});

audio.addEventListener('timeupdate',()=>{

  seekBar.max = audio.duration || 0;
  seekBar.value = audio.currentTime;

  currentTime.textContent = formatTime(audio.currentTime);
  duration.textContent = formatTime(audio.duration);
});

seekBar.addEventListener('input',()=>{
  audio.currentTime = seekBar.value;
});

function formatTime(sec){

  if(!sec) return '0:00';

  const min = Math.floor(sec/60);
  const secs = Math.floor(sec%60);

  return `${min}:${secs.toString().padStart(2,'0')}`;
}

searchInput.addEventListener('keypress',(e)=>{

  if(e.key === 'Enter'){

    const value = searchInput.value.trim();

    if(value){
      loadSongs(value + ' Punjabi');
    }
  }
});

miniPlayer.onclick = ()=>{
  fullPlayer.classList.remove('hidden');
}

closePlayer.onclick = ()=>{
  fullPlayer.classList.add('hidden');
}

async function downloadSong(index){

  const song = currentSongs[index];

  const cache = await caches.open('offline-music');

  await cache.add(song.stream);

  const downloads = JSON.parse(localStorage.getItem('downloads') || '[]');

  downloads.push(song);

  localStorage.setItem('downloads',JSON.stringify(downloads));

  alert('Song Downloaded Offline!');

  loadDownloads();
}

async function loadDownloads(){

  downloadsList.innerHTML='';

  const downloads = JSON.parse(localStorage.getItem('downloads') || '[]');

  downloads.forEach(song=>{

    const card = document.createElement('div');

    card.className='song-card glass rounded-3xl p-3 flex items-center gap-4 mb-4';

    card.innerHTML=`
      <img src="${song.cover}" class="song-cover">

      <div class="flex-1 overflow-hidden">
        <h2 class="font-bold truncate">${song.title}</h2>
        <p class="text-gray-400 text-sm truncate">${song.artist}</p>
      </div>
    `;

    card.addEventListener('click',async()=>{

      const cache = await caches.open('offline-music');

      const response = await cache.match(song.stream);

      if(response){

        const blob = await response.blob();

        audio.src = URL.createObjectURL(blob);

        audio.play();

        updatePlayer(song);
      }
    });

    downloadsList.appendChild(card);

  });
}

function setupMediaSession(song){

  if('mediaSession' in navigator){

    navigator.mediaSession.metadata = new MediaMetadata({
      title:song.title,
      artist:song.artist,
      artwork:[
        {
          src:song.cover,
          sizes:'512x512',
          type:'image/png'
        }
      ]
    });

    navigator.mediaSession.setActionHandler('play',()=>audio.play());
    navigator.mediaSession.setActionHandler('pause',()=>audio.pause());

    navigator.mediaSession.setActionHandler('nexttrack',()=>{
      currentIndex = (currentIndex + 1) % currentSongs.length;
      playSong(currentIndex);
    });

    navigator.mediaSession.setActionHandler('previoustrack',()=>{
      currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
      playSong(currentIndex);
    });
  }
}

window.addEventListener('beforeinstallprompt',(e)=>{

  e.preventDefault();

  deferredPrompt = e;

  installBtn.classList.remove('hidden');
});

installBtn.addEventListener('click',async()=>{

  if(deferredPrompt){
    deferredPrompt.prompt();
  }
});

// PWA Manifest
const manifest = {
  name:'YSN MUSIC',
  short_name:'NeonMusic',
  start_url:'./',
  display:'standalone',
  background_color:'#000000',
  theme_color:'#00ff99',
  orientation:'portrait',
  icons:[
    {
      src:'https://cdn-icons-png.flaticon.com/512/727/727245.png',
      sizes:'512x512',
      type:'image/png'
    }
  ]
};

const manifestBlob = new Blob([
  JSON.stringify(manifest)
],{type:'application/json'});

const manifestURL = URL.createObjectURL(manifestBlob);

document.querySelector('link[rel="manifest"]')?.remove();

const manifestLink = document.createElement('link');
manifestLink.rel='manifest';
manifestLink.href=manifestURL;
document.head.appendChild(manifestLink);

// SERVICE WORKER
if('serviceWorker' in navigator){

  const swCode = `
    const CACHE = 'neon-music-v1';

    self.addEventListener('install',event=>{
      event.waitUntil(
        caches.open(CACHE).then(cache=>{
          return cache.addAll(['./']);
        })
      );
    });

    self.addEventListener('fetch',event=>{
      event.respondWith(
        caches.match(event.request).then(response=>{
          return response || fetch(event.request);
        })
      );
    });
  `;

  const blob = new Blob([swCode],{
    type:'application/javascript'
  });

  const swURL = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swURL);
}

// TABS
const tabs = document.querySelectorAll('.tab-btn');

tabs.forEach(btn=>{

  btn.addEventListener('click',()=>{

    tabs.forEach(b=>b.classList.remove('active-tab'));

    btn.classList.add('active-tab');

    if(btn.dataset.tab === 'downloads'){

      songList.classList.add('hidden');
      downloadsList.classList.remove('hidden');

    }else{

      songList.classList.remove('hidden');
      downloadsList.classList.add('hidden');
    }
  });
});

// Default Punjabi artists
loadSongs('Diljit Dosanjh Parmish Verma Karan Aujla AP Dhillon Punjabi');
loadDownloads();
</script>

</body>
</html>
