<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic Ludo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

h1{
    margin-bottom:20px;
    font-size:42px;
}

#topbar{
    display:flex;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.panel{
    background:#1e293b;
    padding:18px 28px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    text-align:center;
}

#turn{
    font-size:24px;
    font-weight:bold;
}

#dice{
    font-size:55px;
    margin-bottom:10px;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:0.25s;
}

button:hover{
    transform:scale(1.05);
}

#board{
    width:750px;
    height:750px;
    display:grid;
    grid-template-columns:repeat(15,1fr);
    grid-template-rows:repeat(15,1fr);
    background:#ffffff;
    border:12px solid #333;
    position:relative;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.cell{
    border:1px solid #dcdde1;
}

.red-home{background:#d62828;}
.green-home{background:#00a651;}
.yellow-home{background:#f4b400;}
.blue-home{background:#1976d2;}

.red-path{background:#ff8080;}
.green-path{background:#7fffb0;}
.yellow-path{background:#ffe97a;}
.blue-path{background:#7eb8ff;}

.safe{
    background:#dfe6e9 !important;
}

.center{
    background:conic-gradient(
        red 0deg 90deg,
        blue 90deg 180deg,
        green 180deg 270deg,
        yellow 270deg 360deg
    );
}

.token{
    width:32px;
    height:32px;
    border-radius:50%;
    position:absolute;
    z-index:100;
    border:3px solid white;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 5px 10px rgba(0,0,0,0.4);
}

.token:hover{
    transform:scale(1.1);
}

.red{background:#e60000;}
.green{background:#00b050;}
.yellow{background:#ffcc00;}
.blue{background:#0070ff;}

.active-turn{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0px white;}
    50%{box-shadow:0 0 18px white;}
    100%{box-shadow:0 0 0px white;}
}

@media(max-width:850px){

    #board{
        width:95vw;
        height:95vw;
    }

    .token{
        width:20px;
        height:20px;
    }

}

</style>
</head>
<body>

<h1>🎲 Classic Ludo</h1>

<div id="topbar">

    <div class="panel">
        <div id="turn">RED TURN</div>
    </div>

    <div class="panel">
        <div id="dice">🎲</div>
        <button id="rollBtn">Roll Dice</button>
    </div>

</div>

<div id="board"></div>

<script>

const board=document.getElementById("board");
const turnText=document.getElementById("turn");
const diceText=document.getElementById("dice");
const rollBtn=document.getElementById("rollBtn");

const cells=[];

for(let i=0;i<225;i++){

    const cell=document.createElement("div");
    cell.classList.add("cell");
    board.appendChild(cell);
    cells.push(cell);
}

function fillBox(sr,sc,className){

    for(let r=sr;r<sr+6;r++){

        for(let c=sc;c<sc+6;c++){

            cells[r*15+c].classList.add(className);
        }
    }
}

fillBox(0,0,"green-home");
fillBox(0,9,"yellow-home");
fillBox(9,0,"red-home");
fillBox(9,9,"blue-home");

const center=[
111,112,113,
126,127,128,
141,142,143
];

center.forEach(i=>cells[i].classList.add("center"));

const greenLane=[96,81,66,51,36,21];
const yellowLane=[38,53,68,83,98,113];
const blueLane=[128,143,158,173,188,203];
const redLane=[186,171,156,141,126,111];

greenLane.forEach(i=>cells[i].classList.add("green-path"));
yellowLane.forEach(i=>cells[i].classList.add("yellow-path"));
blueLane.forEach(i=>cells[i].classList.add("blue-path"));
redLane.forEach(i=>cells[i].classList.add("red-path"));

const path=[
91,92,93,94,95,80,65,50,35,20,
21,22,23,24,25,26,41,56,71,86,
101,102,103,104,105,120,135,150,165,180,
195,210,209,208,207,206,205,204,203,202,
187,172,157,142,127,126,125,124,123,122,
121,106
];

const safeSpots=[91,21,105,203,127,195,121,25];

safeSpots.forEach(i=>cells[i].classList.add("safe"));

const players=[
{name:"GREEN",color:"green",start:0},
{name:"YELLOW",color:"yellow",start:13},
{name:"BLUE",color:"blue",start:26},
{name:"RED",color:"red",start:39}
];

const homes={
green:[[1,1],[1,3],[3,1],[3,3]],
yellow:[[1,11],[1,13],[3,11],[3,13]],
red:[[11,1],[11,3],[13,1],[13,3]],
blue:[[11,11],[11,13],[13,11],[13,13]]
};

let currentPlayer=0;
let diceValue=0;

const tokens=[];

players.forEach((p,pIndex)=>{

    for(let i=0;i<4;i++){

        const token=document.createElement("div");

        token.classList.add("token",p.color);

        token.dataset.player=pIndex;
        token.dataset.pos=-1;
        token.dataset.id=i;

        token.onclick=()=>moveToken(token);

        board.appendChild(token);

        tokens.push(token);

        setHome(token,p.color,i);
    }
});

function setHome(token,color,index){

    const pos=homes[color][index];
    moveVisual(token,pos[0],pos[1]);
}

function moveVisual(token,row,col){

    const size=board.clientWidth/15;

    token.style.left=(col*size+size*0.18)+"px";
    token.style.top=(row*size+size*0.18)+"px";
}

function renderToken(token){

    let pos=parseInt(token.dataset.pos);

    if(pos===-1){

        setHome(token,
            players[token.dataset.player].color,
            token.dataset.id);

    }else{

        let boardIndex=path[pos%path.length];

        let row=Math.floor(boardIndex/15);
        let col=boardIndex%15;

        moveVisual(token,row,col);
    }
}

function updateTurnUI(){

    turnText.innerHTML=players[currentPlayer].name+" TURN";

    turnText.style.color=players[currentPlayer].color;

    document.querySelectorAll(".token")
    .forEach(t=>t.classList.remove("active-turn"));

    tokens.forEach(t=>{

        if(parseInt(t.dataset.player)===currentPlayer){

            t.classList.add("active-turn");
        }
    });
}

updateTurnUI();

rollBtn.onclick=()=>{

    diceValue=Math.floor(Math.random()*6)+1;

    const faces=["⚀","⚁","⚂","⚃","⚄","⚅"];

    diceText.innerHTML=faces[diceValue-1];
};

function moveToken(token){

    if(parseInt(token.dataset.player)!==currentPlayer)
        return;

    if(diceValue===0)
        return;

    let pos=parseInt(token.dataset.pos);

    if(pos===-1){

        if(diceValue===6){

            pos=players[currentPlayer].start;

        }else{

            nextTurn();
            diceValue=0;
            return;
        }

    }else{

        pos+=diceValue;

        if(pos>=path.length){

            token.dataset.pos=path.length;
            renderToken(token);
            checkWinner(currentPlayer);

            if(diceValue!==6){
                nextTurn();
            }

            diceValue=0;
            return;
        }
    }

    token.dataset.pos=pos;

    renderToken(token);

    killCheck(token);

    if(diceValue!==6){

        nextTurn();
    }

    diceValue=0;
}

function nextTurn(){

    currentPlayer++;

    if(currentPlayer>=players.length){

        currentPlayer=0;
    }

    updateTurnUI();
}

function killCheck(active){

    let activePos=parseInt(active.dataset.pos);

    let boardIndex=path[activePos];

    if(safeSpots.includes(boardIndex))
        return;

    tokens.forEach(t=>{

        if(t===active)
            return;

        if(t.dataset.player===active.dataset.player)
            return;

        if(parseInt(t.dataset.pos)===activePos){

            t.dataset.pos=-1;
            renderToken(t);
        }
    });
}

function checkWinner(playerIndex){

    let playerTokens=tokens.filter(
        t=>parseInt(t.dataset.player)===playerIndex
    );

    let won=playerTokens.every(
        t=>parseInt(t.dataset.pos)>=path.length
    );

    if(won){

        setTimeout(()=>{

            alert(players[playerIndex].name+" WINS! 🎉");
            location.reload();

        },300);
    }
}

window.addEventListener("resize",()=>{

    tokens.forEach(renderToken);
});

tokens.forEach(renderToken);

</script>

</body>
</html>
