<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Ludo Professional</title>
    <style>
        :root {
            --red: #e74c3c; --green: #27ae60; --yellow: #f1c40f; --blue: #2980b9;
            --white: #ffffff; --black: #2c3e50; --border: #000000;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #e0e0e0; font-family: 'Arial', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .setup-card { text-align: center; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .btn { padding: 12px 25px; margin: 10px; cursor: pointer; border: none; background: var(--black); color: white; border-radius: 5px; font-weight: bold; }
        
        #game-wrap { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 600px; padding: 10px; }
        #ui-top { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        
        #board {
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr);
            width: 100%; aspect-ratio: 1/1; border: 4px solid var(--border); background: var(--white); position: relative;
        }
        .cell { border: 0.5px solid #666; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* Home Boxes */
        .home { grid-area: span 6 / span 6; border: 2px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; padding: 15%; gap: 15%; }
        .token-base { background: white; border-radius: 50%; border: 1px solid #999; }
        .red { background: var(--red); } .green { background: var(--green); } .yellow { background: var(--yellow); } .blue { background: var(--blue); }
        
        /* Path coloring */
        .p-red { background: var(--red); } .p-green { background: var(--green); } .p-yellow { background: var(--yellow); } .p-blue { background: var(--blue); }
        .safe { background: #dcdcdc; }
        .safe::after { content: '★'; color: #777; font-size: 1.2vw; }

        /* Finish Center */
        #finish {
            grid-area: 7 / 7 / 10 / 10; border: 1px solid var(--border);
            background: conic-gradient(var(--yellow) 0deg 90deg, var(--blue) 90deg 180deg, var(--red) 180deg 270deg, var(--green) 270deg 360deg);
        }

        /* Token Styling */
        .token {
            width: 80%; height: 80%; border-radius: 50%; position: absolute; cursor: pointer;
            border: 3px solid rgba(255,255,255,0.7); box-shadow: 0 4px 6px rgba(0,0,0,0.4); z-index: 100;
            transition: all 0.2s ease;
        }
        .token.active { animation: bounce 0.6s infinite alternate; filter: brightness(1.2); box-shadow: 0 0 15px #fff; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Dice UI */
        #dice-box { width: 60px; height: 60px; background: white; border-radius: 8px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; transition: transform 0.1s; }
        #dice-box.rolling { animation: shake 0.3s infinite; }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-card" id="step1">
        <h1>CLASSIC LUDO</h1><br>
        <p>Players:</p>
        <button class="btn" onclick="choosePlayers(2)">2 Players</button>
        <button class="btn" onclick="choosePlayers(3)">3 Players</button>
        <button class="btn" onclick="choosePlayers(4)">4 Players</button>
    </div>
    <div class="setup-card" id="step2" style="display:none">
        <p>Difficulty:</p>
        <button class="btn" onclick="start(1)">Easy</button>
        <button class="btn" onclick="start(2)">Medium</button>
        <button class="btn" onclick="start(3)">Hard</button>
    </div>
</div>

<div id="game-wrap">
    <div id="ui-top">
        <div id="status">RED'S TURN</div>
        <div id="dice-box" onclick="rollDice()">⚀</div>
    </div>
    <div id="board"></div>
</div>

<script>
    const config = {
        red: { start: 1, home: [7,1], entry: 51, base: [2,2, 2,3, 3,2, 3,3], color: 'red' },
        green: { start: 14, home: [1,7], entry: 12, base: [2,11, 2,12, 3,11, 3,12], color: 'green' },
        yellow: { start: 27, home: [7,13], entry: 25, base: [11,11, 11,12, 12,11, 12,12], color: 'yellow' },
        blue: { start: 40, home: [13,7], entry: 38, base: [11,2, 11,3, 12,2, 12,3], color: 'blue' }
    };
    
    const path = [
        "6,0","6,1","6,2","6,3","6,4","6,5","5,6","4,6","3,6","2,6","1,6","0,6","0,7","0,8","1,8","2,8","3,8","4,8","5,8","6,9","6,10","6,11","6,12","6,13","6,14","7,14","8,14","8,13","8,12","8,11","8,10","8,9","9,8","10,8","11,8","12,8","13,8","14,8","14,7","14,6","13,6","12,6","11,6","10,6","9,6","8,5","8,4","8,3","8,2","8,1","8,0","7,0"
    ];

    let state = {
        turn: 'red', players: [], bots: [], dice: 1, canRoll: true, difficulty: 2, winners: []
    };
    let tokens = {};

    function choosePlayers(n) {
        state.players = ['red', 'green', 'yellow', 'blue'].slice(0, n);
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }

    function start(diff) {
        state.difficulty = diff;
        state.bots = state.players.slice(1);
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-wrap').style.display = 'flex';
        initBoard();
        initTokens();
        render();
    }

    function initBoard() {
        const b = document.getElementById('board');
        for(let r=0; r<15; r++){
            for(let c=0; c<15; c++){
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `c-${r}-${c}`;
                
                if(r<6 && c<6) cell.classList.add('red');
                else if(r<6 && c>8) cell.classList.add('green');
                else if(r>8 && c>8) cell.classList.add('yellow');
                else if(r>8 && c<6) cell.classList.add('blue');
                else if(r==7 && c==7) cell.id = 'finish';
                
                // Color safe zones & paths
                if(r==7 && c>0 && c<7) cell.classList.add('p-red');
                if(c==7 && r>0 && r<7) cell.classList.add('p-green');
                if(r==7 && c>7 && c<14) cell.classList.add('p-yellow');
                if(c==7 && r>7 && r<14) cell.classList.add('p-blue');
                if((r==6&&c==1)||(r==1&&c==8)||(r==8&&c==13)||(r==13&&c==6)||(r==8&&c==2)||(r==2&&c==6)||(r==6&&c==12)||(r==12&&c==8)) cell.classList.add('safe');

                b.appendChild(cell);
            }
        }
    }

    function initTokens() {
        state.players.forEach(p => {
            tokens[p] = [0,1,2,3].map(i => ({ id: i, pos: -1, status: 'base' }));
        });
    }

    function render() {
        document.querySelectorAll('.token').forEach(t => t.remove());
        state.players.forEach(p => {
            tokens[p].forEach(t => {
                if(t.status === 'done') return;
                const el = document.createElement('div');
                el.className = `token ${p}`;
                el.onclick = () => move(p, t.id);
                
                let target;
                if(t.status === 'base') target = document.getElementById(`c-${config[p].base[t.id*2]}-${config[p].base[t.id*2+1]}`);
                else if(t.status === 'path') target = document.getElementById(`c-${path[t.pos].split(',')[0]}-${path[t.pos].split(',')[1]}`);
                else if(t.status === 'home') {
                    const dr = config[p].home[0], dc = config[p].home[1];
                    const steps = t.pos;
                    let r = dr, c = dc;
                    if(p==='red') c += steps; if(p==='green') r += steps; if(p==='yellow') c -= steps; if(p==='blue') r -= steps;
                    target = document.getElementById(`c-${r}-${c}`);
                }
                if(target) target.appendChild(el);
            });
        });
        document.getElementById('status').innerText = `${state.turn.toUpperCase()}'S TURN`;
        document.getElementById('status').style.color = `var(--${state.turn})`;
    }

    function rollDice() {
        if(!state.canRoll || state.bots.includes(state.turn)) return;
        executeRoll();
    }

    function executeRoll() {
        state.canRoll = false;
        const db = document.getElementById('dice-box');
        db.classList.add('rolling');
        setTimeout(() => {
            state.dice = Math.floor(Math.random()*6)+1;
            db.innerText = ['⚀','⚁','⚂','⚃','⚄','⚅'][state.dice-1];
            db.classList.remove('rolling');
            logic();
        }, 500);
    }

    function logic() {
        const p = state.turn;
        const valid = tokens[p].filter(t => canMove(p, t));
        
        if(valid.length === 0) return nextTurn();
        if(state.bots.includes(p)) {
            setTimeout(() => {
                let picked = valid[0];
                if(state.difficulty > 1) {
                    const kill = valid.find(t => willKill(p, t));
                    if(kill) picked = kill;
                }
                move(p, picked.id);
            }, 600);
        } else {
